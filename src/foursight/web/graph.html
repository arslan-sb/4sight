<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>4sight -- DAG Explorer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; background:#0f1115; color:#e6e6e6; }
    select { background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; padding:6px 10px; }
    .nav { display:flex; gap:8px; margin-bottom:16px; }
    .nav a { color:#6b8cff; text-decoration:none; font-size:14px; }
    .nav a:hover { text-decoration:underline; }
    .breadcrumb { margin:12px 0; }
    .breadcrumb span { cursor:pointer; color:#6b8cff; font-size:14px; }
    .breadcrumb span:hover { text-decoration:underline; }
    .breadcrumb .sep { opacity:0.3; cursor:default; }
    .layer-title { font-size:18px; font-weight:700; margin:16px 0 8px 0; }
    .node-card { border:1px solid #2a2e36; border-radius:8px; padding:12px 16px; margin:8px 0; cursor:pointer; transition:background 0.15s; display:flex; align-items:center; gap:12px; }
    .node-card:hover { background:#1a1d24; }
    .node-card .info { flex:1; }
    .node-card .title { font-size:15px; }
    .node-card .kind { font-size:10px; opacity:0.5; text-transform:uppercase; margin-left:6px; }
    .node-card .meta { font-size:11px; opacity:0.5; margin-top:2px; }
    .sev-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .sev-dot-critical { background:#ff6b6b; box-shadow:0 0 8px #ff6b6b; }
    .sev-dot-high { background:#ffb347; box-shadow:0 0 6px #ffb347; }
    .sev-dot-medium { background:#ffd700; }
    .sev-dot-low { background:#4caf50; }
    .sev-dot-none { background:#3a3e46; }
    .dep-section { margin-top:16px; border-top:1px dashed #2a2e36; padding-top:12px; }
    .dep-label { font-size:12px; opacity:0.5; margin-bottom:6px; }
    .dep-card { border:1px dashed #3a3e46; border-radius:8px; padding:10px 14px; margin:6px 0; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .dep-card:hover { background:#1a1d24; }
    .dep-tag { font-size:9px; background:#1a2740; color:#6b8cff; padding:2px 5px; border-radius:3px; }
    .arrow { font-size:18px; opacity:0.4; }
    #detail { border:1px solid #2a2e36; border-radius:12px; padding:18px; margin-top:16px; display:none; }
    #detail h3 { margin-top:0; }
    .sev { font-weight:700; padding:2px 8px; border-radius:4px; font-size:13px; }
    .sev-critical { background:#4a1018; color:#ff6b6b; }
    .sev-high { background:#3d2e0a; color:#ffb347; }
    .sev-medium { background:#2d2a0a; color:#ffd700; }
    .sev-low { background:#0a2d0a; color:#4caf50; }
    button { padding:6px 12px; cursor:pointer; background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; margin-right:4px; }
    button:hover { background:#2a2e36; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Report Viewer</a>
    <span style="opacity:0.3">|</span>
    <a href="/graph">DAG Explorer</a>
    <span style="opacity:0.3">|</span>
    <a href="/raw">Raw Graph</a>
  </div>
  <h1>DAG Explorer</h1>
  <div>
    View as:
    <select id="role" onchange="refresh()">
      <option value="reviewer">reviewer</option>
      <option value="privileged">privileged</option>
    </select>
    <button onclick="refresh()">Refresh</button>
    <button onclick="injectAll()" style="background:#3d2e0a;">Inject all scenarios</button>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="layer"></div>
  <div id="detail"></div>
  <script src="/static/graph.js"></script>
  <script>boot();</script>
</body>
</html>
