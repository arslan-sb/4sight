<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>4sight -- Raw Graph</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 40px auto; background:#0f1115; color:#e6e6e6; }
    .nav { display:flex; gap:8px; margin-bottom:16px; }
    .nav a { color:#6b8cff; text-decoration:none; font-size:14px; }
    .nav a:hover { text-decoration:underline; }
    select { background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; padding:6px 10px; }
    button { padding:6px 12px; cursor:pointer; background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; margin-right:4px; }
    button:hover { background:#2a2e36; }
    h2 { margin-top:24px; }
    #canvas-wrap { position:relative; border:1px solid #2a2e36; border-radius:12px; overflow:hidden; margin:12px 0; background:#0a0c10; }
    canvas { display:block; }
    #tooltip { position:absolute; pointer-events:none; background:#1a1d24; border:1px solid #2a2e36; border-radius:8px; padding:10px 14px; font-size:13px; display:none; max-width:280px; z-index:10; }
    #tooltip .tt-title { font-weight:700; margin-bottom:4px; }
    #tooltip .tt-meta { font-size:11px; opacity:0.6; }
    .sev { font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
    .sev-critical { background:#4a1018; color:#ff6b6b; }
    .sev-high { background:#3d2e0a; color:#ffb347; }
    .sev-medium { background:#2d2a0a; color:#ffd700; }
    .sev-low { background:#0a2d0a; color:#4caf50; }
    #detail { border:1px solid #2a2e36; border-radius:12px; padding:18px; margin-top:16px; display:none; }
    #detail h3 { margin-top:0; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Report Viewer</a>
    <span style="opacity:0.3">|</span>
    <a href="/graph">DAG Explorer</a>
    <span style="opacity:0.3">|</span>
    <a href="/raw">Raw Graph</a>
  </div>
  <h1>Raw Graph</h1>
  <div>
    View as:
    <select id="role" onchange="refresh()">
      <option value="reviewer">reviewer</option>
      <option value="privileged">privileged</option>
    </select>
    <button onclick="refresh()">Refresh</button>
    <span style="font-size:12px;opacity:0.4;margin-left:12px;">click a node to see its report</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
  </div>
  <div id="detail"></div>
  <script src="/static/raw.js"></script>
  <script>refresh();</script>
</body>
</html>
