<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>4sight -- Report Viewer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; background:#0f1115; color:#e6e6e6; }
    button { margin-right: 8px; padding: 8px 12px; cursor: pointer; background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; }
    button:hover { background:#2a2e36; }
    .crumb { opacity: 0.6; font-size: 13px; margin: 14px 0; }
    .card { border: 1px solid #2a2e36; border-radius: 12px; padding: 18px; }
    .sev { font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .sev-critical { background:#4a1018; color:#ff6b6b; }
    .sev-high { background:#3d2e0a; color:#ffb347; }
    .sev-medium { background:#2d2a0a; color:#ffd700; }
    .sev-low { background:#0a2d0a; color:#4caf50; }
    .driver { border: 1px solid #2a2e36; border-radius: 8px; padding: 8px 10px; margin: 6px 0; cursor: pointer; display:flex; justify-content:space-between; align-items:center; }
    .driver:hover { background: #1a1d24; }
    .driver-sev { font-size:11px; font-weight:700; padding:2px 6px; border-radius:3px; }
    select { background:#1a1d24; color:#e6e6e6; border:1px solid #2a2e36; border-radius:6px; padding:6px 10px; }
    .nav { display:flex; gap:8px; margin-bottom:16px; }
    .nav a { color:#6b8cff; text-decoration:none; font-size:14px; }
    .nav a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Report Viewer</a>
    <span style="opacity:0.3">|</span>
    <a href="/graph">Graph Explorer</a>
    <span style="opacity:0.3">|</span>
    <a href="/raw">Raw Graph</a>
  </div>
  <h1>4sight</h1>
  <div>
    <button onclick="simulate('leave')">Simulate: leave</button>
    <button onclick="simulate('salary')">Simulate: salary</button>
    View as:
    <select id="role" onchange="reload()">
      <option value="reviewer">reviewer</option>
      <option value="privileged">privileged</option>
    </select>
  </div>
  <div class="crumb" id="crumb"></div>
  <div class="card" id="report"></div>
  <script src="/static/app.js"></script>
  <script>boot();</script>
</body>
</html>
